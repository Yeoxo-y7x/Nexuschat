<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ NexusChat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <h2>⚡ NexusChat</h2>
        <div class="server-list" id="serverList"></div>
        <button class="create-server-btn" onclick="openModal('serverModal')">+ Créer un serveur</button>
        <div style="margin-top:15px;font-size:13px;color:#888;">Badges: <span id="userBadges">⭐</span></div>
        <div class="friend-list">
            <div style="font-weight:bold;margin-bottom:6px;">👥 Amis</div>
            <div id="friendList"></div>
        </div>
        <div class="profile-card" onclick="openModal('profileModal')">
            <img id="profileAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23b48aff'/%3E%3Ctext x='35' y='65' font-size='40' fill='%231e1e2f'%3E👤%3C/text%3E%3C/svg%3E" alt="avatar">
            <div>
                <span id="userNameDisplay">Toi</span>
                <span style="font-size:11px;color:#888;">Clique pour modifier</span>
            </div>
        </div>
    </div>

    <!-- MAIN CHAT -->
    <div class="main">
        <div class="header">
            <div>
                <span id="currentChatName"># Général</span>
                <span id="currentChatType" style="font-size:13px;color:#888;margin-left:10px;">(public)</span>
            </div>
            <button class="dm-btn" onclick="openModal('dmModal')">💬 DM</button>
        </div>
        <div class="chat-area" id="chatArea"></div>
        <div class="input-area">
            <div class="emoji-picker" id="emojiPicker">
                <span onclick="addEmoji('😀')">😀</span><span onclick="addEmoji('😂')">😂</span>
                <span onclick="addEmoji('🔥')">🔥</span><span onclick="addEmoji('💀')">💀</span>
                <span onclick="addEmoji('❤️')">❤️</span><span onclick="addEmoji('🚀')">🚀</span>
                <span onclick="addEmoji('👑')">👑</span><span onclick="addEmoji('💎')">💎</span>
                <span onclick="addEmoji('🤣')">🤣</span><span onclick="addEmoji('😈')">😈</span>
                <span onclick="addEmoji('🎮')">🎮</span><span onclick="addEmoji('📱')">📱</span>
                <span onclick="addEmoji('💻')">💻</span><span onclick="addEmoji('⚡')">⚡</span>
                <span onclick="addEmoji('✅')">✅</span><span onclick="addEmoji('❌')">❌</span>
                <span onclick="addEmoji('💯')">💯</span><span onclick="addEmoji('🤡')">🤡</span>
                <span onclick="addEmoji('👾')">👾</span><span onclick="addEmoji('🎉')">🎉</span>
            </div>
            <input type="text" id="msgInput" placeholder="Écrire un message...">
            <button onclick="sendMessage()">Envoyer</button>
        </div>
        <!-- Admin Panel -->
        <div id="adminPanel" class="admin-panel">
            <h3>🛠️ Panel Admin</h3>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:10px 0;">
                <input type="text" id="adminCode" placeholder="Code (Y7X)">
                <button onclick="activateAdmin()">🔓 Activer</button>
                <span id="adminStatus" style="color:#f04747;">❌</span>
            </div>
            <div id="adminControls" style="display:none;">
                <select id="userSelect"></select>
                <select id="badgeSelect">
                    <option value="⭐">⭐</option><option value="🔥">🔥</option>
                    <option value="💎">💎</option><option value="👑">👑</option>
                    <option value="💀">💀</option><option value="🌈">🌈</option>
                    <option value="⚡">⚡</option>
                </select>
                <button onclick="giveBadge()">➕ Donner</button>
                <button onclick="removeBadge()">➖ Retirer</button>
                <div id="allUserBadges" style="margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    <div id="serverModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('serverModal')">&times;</span>
            <h3>Créer un serveur</h3>
            <input type="text" id="newServerName" placeholder="Nom">
            <button onclick="createServer()">Créer</button>
        </div>
    </div>
    <div id="profileModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('profileModal')">&times;</span>
            <h3>👤 Mon profil</h3>
            <label>Pseudo</label>
            <input type="text" id="profileName" placeholder="Nouveau pseudo">
            <label>Avatar (URL)</label>
            <input type="text" id="profileAvatarUrl" placeholder="https://exemple.com/avatar.png">
            <label>Bannière (URL)</label>
            <input type="text" id="profileBannerUrl" placeholder="https://exemple.com/banner.png">
            <button onclick="updateProfile()">Mettre à jour</button>
        </div>
    </div>
    <div id="dmModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('dmModal')">&times;</span>
            <h3>💬 Nouveau message privé</h3>
            <select id="dmUserSelect"></select>
            <button onclick="openDM()">Ouvrir le DM</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
